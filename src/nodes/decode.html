<script type="text/javascript">
    RED.nodes.registerType('decode', {
        category: 'protobuf',
        color: '#FDD0A2',
        defaults: {
            name: { value: "" },
            protofile: { value: "", type: "protobuf-file", required: true, label: "Proto file" },
            protoType: { value: "", required: false },
            delimited: { value: false },
            delimitedOutput: { value: "messages" },
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-expand",
        inputLabels: "protobuf buffer",
        outputLabels: "object",
        label: function() {
            return this.name || "decode";
        },
        oneditprepare: function() {
            var delimitedCheckbox = $("#node-input-delimited");
            var outputRow = $("#node-input-delimitedOutput-row");
            var toggleOutputRow = function() {
                outputRow.toggle(delimitedCheckbox.is(":checked"));
            };
            delimitedCheckbox.on("change", toggleOutputRow);
            toggleOutputRow();
        }
    });
</script>

<script type="text/html" data-template-name="decode">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Optional display name">
    </div>
    <div class="form-row">
        <label for="node-input-protofile"><i class="fa fa-file-code-o"></i> Proto file</label>
        <input type="text" id="node-input-protofile">
    </div>
    <div class="form-row">
        <label for="node-input-protoType"><i class="fa fa-cube"></i> Type</label>
        <input type="text" id="node-input-protoType" placeholder="Example: package.Message">
    </div>
    <div class="form-tips" id="node-input-protobuf-type-tip">
        When <code>msg.protobufType</code> is set, the value overrides this field.
    </div>
    <div class="form-row">
        <label for="node-input-delimited"><i class="fa fa-list-ol"></i> Delimited</label>
        <input type="checkbox" id="node-input-delimited" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Read length-prefixed messages (stream framing)</span>
    </div>
    <div class="form-row" id="node-input-delimitedOutput-row">
        <label for="node-input-delimitedOutput"><i class="fa fa-sign-out"></i> Output</label>
        <select id="node-input-delimitedOutput" style="width: 70%;">
            <option value="messages">One message per decoded item</option>
            <option value="array">Single message with array payload</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="decode">
    <p>Decodes a protobuf binary buffer into a JavaScript object.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">buffer</span>
        </dt>
        <dd>
            Protobuf-encoded binary message.
        </dd>
        <dt>protobufType
            <span class="property-type">string</span>
        </dt>
        <dd>
            Optional protobuf message type name. This value overrides the configured message type.
        </dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">object</span>
        </dt>
        <dd>
            JavaScript object containing decoded protobuf fields.
        </dd>
        <dt>protobufType
            <span class="property-type">string</span>
        </dt>
        <dd>
            Message type used for decoding.
        </dd>
    </dl>
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Proto file <span class="property-type">config</span></dt>
        <dd>Required protobuf-file configuration node.</dd>
        <dt>Type <span class="property-type">string</span></dt>
        <dd>Optional when <code>msg.protobufType</code> is set.</dd>
        <dt>Delimited <span class="property-type">boolean</span></dt>
        <dd>Reads length-prefixed messages (protobuf.js <code>decodeDelimited</code>). Off by default.</dd>
        <dt>Output <span class="property-type">select</span></dt>
        <dd>How decoded delimited messages are sent: one message per decoded item, or a single message with an array payload.</dd>
    </dl>
    <h3>Details</h3>
    <p>The node decodes <code>msg.payload</code> with protobuf.js and converts longs, enums, and bytes to strings.</p>
    <p>msg.protobufType overrides the configured message type.</p>
    <p>If a proto2 message is incomplete but protobuf.js can recover fields, the node sends a partial decoded message.</p>
    <p>If the buffer cannot be decoded, the node reports an error and does not send a message.</p>
    <p>With <b>Delimited</b> enabled, the buffer may contain several length-prefixed messages back to back. By default the node sends one message per decoded item, so each payload looks the same as in non-delimited mode. Choose the array output to receive a single message whose payload is an array of all decoded objects. If any frame is corrupted, the node reports an error and sends nothing.</p>
    <h3>Example</h3>
    <p>With message type <code>TestType</code> selected, a wire-format buffer decodes back into:</p>
    <pre>{
    "timestamp": 1533295590569,
    "foo": 1.5,
    "bar": true,
    "test": "hello"
}</pre>
    <p>With <b>Delimited</b> enabled and a buffer holding two framed messages, the default output sends two messages; the array output sends one message with:</p>
    <pre>[
    { "test": "first" },
    { "test": "second" }
]</pre>
    <h3>References</h3>
    <ul>
        <li><a href="https://protobufjs.github.io/protobuf.js/Type.html" target="_blank">protobuf.js Type API</a> - the <code>decode</code>, <code>decodeDelimited</code>, and <code>toObject</code> methods this node uses</li>
        <li><a href="https://protobuf.dev/programming-guides/encoding/" target="_blank">Protobuf encoding (wire format)</a> - how messages are represented as bytes</li>
        <li><a href="https://protobuf.dev/programming-guides/techniques/#streaming" target="_blank">Streaming multiple messages</a> - why length-delimited framing exists</li>
    </ul>
</script>
