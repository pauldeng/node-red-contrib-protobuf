<script type="text/javascript">
    RED.nodes.registerType('decode', {
        category: 'protobuf',
        color: '#FDD0A2',
        defaults: {
            name: { value: "" },
            protofile: { value: "", type: "protobuf-file", required: true, label: "Proto file" },
            protoType: { value: "", required: false },
            delimited: { value: false },
            delimitedOutput: { value: "messages" },
            enumsType: { value: "String" },
            longsType: { value: "String" },
            bytesType: { value: "String" },
            decodeDefaults: { value: false },
            decodeArrays: { value: false },
            decodeObjects: { value: false },
            decodeOneofs: { value: false },
            decodeJson: { value: false },
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-expand",
        inputLabels: "protobuf buffer",
        outputLabels: "object",
        label: function() {
            return this.name || "decode";
        },
        oneditprepare: function() {
            var delimitedCheckbox = $("#node-input-delimited");
            var outputRow = $("#node-input-delimitedOutput-row");
            var toggleOutputRow = function() {
                outputRow.toggle(delimitedCheckbox.is(":checked"));
            };
            delimitedCheckbox.on("change", toggleOutputRow);
            toggleOutputRow();
            [
                ["enumsType", "String"],
                ["longsType", "String"],
                ["bytesType", "String"]
            ].forEach(function(option) {
                var input = $("#node-input-" + option[0]);
                if (input.val() === null || input.val() === "") {
                    input.val(option[1]);
                }
            });
        }
    });
</script>

<script type="text/markdown" data-help-name="decode">
Decodes a protobuf binary buffer into a JavaScript object.

### Inputs

| Property | Type | Description |
| --- | --- | --- |
| `msg.payload` | buffer | Protobuf-encoded binary message. |
| `msg.protobufType` | string | Optional protobuf message type name. This value overrides the configured message type. |

### Outputs

| Property | Type | Description |
| --- | --- | --- |
| `msg.payload` | object \| array | JavaScript object containing decoded protobuf fields. With **Delimited** enabled and array output selected, this is an array of objects. |
| `msg.protobufType` | string | Message type used for decoding. |

### Configuration

| Field | Default | Description |
| --- | --- | --- |
| Proto file | required | `protobuf-file` configuration node that loads the schema. |
| Type | empty | Message type to decode. Optional when `msg.protobufType` is set. |
| Delimited | unchecked | Reads length-prefixed messages with protobuf.js `decodeDelimited`. |
| Output | one message per decoded item | For delimited input, send one Node-RED message per decoded item or one message whose payload is an array. |

### Output options

These map to protobuf.js [`toObject` conversion options](https://protobufjs.github.io/protobuf.js/global.html#IConversionOptions). The defaults match the node's historical behaviour, so existing flows are unchanged.

The checkbox options are unchecked by default. protobuf.js treats omitted boolean conversion options as false, so none of these checkboxes should be checked by default.

| Option | Default | Effect | Example |
| --- | --- | --- | --- |
| Enums | `String` | Output enum names or numeric values. | `GREEN` as String -> `"GREEN"`; Number -> `1`. |
| Longs | `String` | Output 64-bit integers as `String`, `Number`, `BigInt`, or a `Long` object. | String -> `"9007199254740993"`; BigInt -> `9007199254740993n`. |
| Bytes | `String` | Output `bytes` fields as base64 `String`, base64url `String`, byte `Array`, or `Buffer`. | String (base64) -> `"+/8="`; String (base64url) -> `"-_8"`; Array -> `[251,255]`; Buffer -> `<Buffer fb ff>`. |
| Defaults | unchecked | Include unset fields with default values. | `{}` becomes `{ "color": "RED", "numbers": [], "labels": {} }` for unset fields. |
| Empty arrays | unchecked | Include unset `repeated` fields without forcing all scalar defaults. | `{}` becomes `{ "numbers": [] }`. |
| Empty objects | unchecked | Include unset `map` fields without forcing all scalar defaults. | `{}` becomes `{ "labels": {} }`. |
| Virtual oneofs | unchecked | Add a discriminator property named after the `oneof`. | Field `text` in oneof `choice` adds `"choice": "text"`. |
| JSON floats | unchecked | Convert `NaN` and `Infinity` float values to strings. | `NaN` becomes `"NaN"`. |

### Details

The node decodes `msg.payload` with protobuf.js. By default longs, enums, and bytes are converted to strings; use the Output options above to change that.

msg.protobufType overrides the configured message type.

If a proto2 message is incomplete but protobuf.js can recover fields, the node sends a partial decoded message.

If the buffer cannot be decoded, the node reports an error and does not send a message.

With **Delimited** enabled, the buffer may contain several length-prefixed messages back to back. By default the node sends one message per decoded item, so each payload looks the same as in non-delimited mode. Choose the array output to receive a single message whose payload is an array of all decoded objects. If any frame is corrupted, the node reports an error and sends nothing.

> [!WARNING]
> **false vs not set (proto3):** plain proto3 scalar fields have *implicit presence*. A value equal to the field default (`false`, `0`, `""`) is never transmitted, so it is **missing from the decoded object**. The wire bytes for "set to false" and "never set" are identical - no decoder can tell them apart.
>
> ```
> // schema: bool enabled = 1;
> { "enabled": false } -> encode -> decode -> { }   // enabled is gone!
> ```
>
> When your flow must distinguish `false` from "not set", declare the field `optional` in proto3, or use a proto2 or Editions schema - those track presence, so the value survives:
>
> ```
> // schema: optional bool enabled = 1;
> { "enabled": false } -> encode -> decode -> { "enabled": false }
> ```

### Example

With message type `TestType` selected, a wire-format buffer decodes back into:

```json
{
    "timestamp": 1533295590569,
    "foo": 1.5,
    "bar": true,
    "test": "hello"
}
```

With **Delimited** enabled and a buffer holding two framed messages, the default output sends two messages; the array output sends one message with:

```json
[
    { "test": "first" },
    { "test": "second" }
]
```

### Output option examples

For a schema with enum `color`, repeated field `numbers`, map field `labels`, bytes field `data`, int64 field `big`, double field `ratio`, and oneof `choice`, the same decoded wire data can be converted into different JavaScript shapes.

Default output:

```json
{
    "color": "GREEN",
    "data": "Af8=",
    "big": "9007199254740993",
    "text": "hi"
}
```

With **Longs** set to `BigInt`, **Enums** set to `Number`, and **Bytes** set to `Array`:

```js
{
    color: 1,
    data: [1, 255],
    big: 9007199254740993n,
    text: "hi"
}
```

With **Defaults** checked, unset fields are included:

```json
{
    "color": "RED",
    "numbers": [],
    "labels": {},
    "data": "",
    "big": "0",
    "ratio": 0
}
```

With **Empty arrays** checked, only missing repeated fields are added:

```json
{
    "numbers": []
}
```

With **Empty objects** checked, only missing map fields are added:

```json
{
    "labels": {}
}
```

With **Virtual oneofs** checked and the `text` field set:

```json
{
    "text": "hi",
    "choice": "text"
}
```

With **JSON floats** checked:

```json
{
    "ratio": "NaN"
}
```

### References

- [protobuf.js Type API](https://protobufjs.github.io/protobuf.js/Type.html) - the `decode`, `decodeDelimited`, and `toObject` methods this node uses
- [Protobuf encoding (wire format)](https://protobuf.dev/programming-guides/encoding/) - how messages are represented as bytes
- [Streaming multiple messages](https://protobuf.dev/programming-guides/techniques/#streaming) - why length-delimited framing exists
- [Field presence](https://protobuf.dev/programming-guides/field_presence/) - why proto3 default values disappear and how `optional` fixes it
</script>
