<script type="text/markdown" data-help-name="encode">
Encodes a JavaScript object into a protobuf binary buffer.

### Inputs

: payload (object | array) : JavaScript object containing fields for the selected protobuf message type. With **Delimited** enabled, an array of objects is also accepted.
: protobufType (string) : Optional protobuf message type name. This value overrides the configured message type.

### Outputs

: payload (buffer) : Protobuf-encoded binary message.
: protobufType (string) : Message type used for encoding.

### Configuration

: Proto file (config) : Required protobuf-file configuration node.
: Type (string) : Optional when `msg.protobufType` is set.
: Delimited (boolean) : Prefixes each message with its byte length (protobuf.js `encodeDelimited`). Off by default.

### Details

The node verifies `msg.payload` against the selected protobuf message type and encodes it with protobuf.js.

msg.protobufType overrides the configured message type.

If the payload does not match the selected type, the node reports a warning and does not send a message.

With **Delimited** enabled, the payload may be a single object or an array of objects. Each object becomes one length-prefixed message and the output buffer contains them back to back - the framing used for streams and files of concatenated messages.

> [!WARNING]
> **false vs not set (proto3):** for plain proto3 scalar fields, sending the default value (`false`, `0`, `""`) produces the same bytes as not sending the field at all - the receiver cannot tell the difference, and the field will be missing after decode. Declare the field `optional` in proto3, or use a proto2 or Editions schema, when this distinction matters.

### Example

With message type `TestType` selected, this `msg.payload`:

```json
{
    "timestamp": 1533295590569,
    "foo": 1.5,
    "bar": true,
    "test": "hello"
}
```

becomes a binary wire-format buffer such as `<Buffer 09 00 90 ca 9f f8 4f 76 42 ...>`.

With **Delimited** enabled, an array becomes one buffer holding each message with its byte-length prefix:

```json
[
    { "test": "first" },
    { "test": "second" }
]
```

### References

- [protobuf.js Type API](https://protobufjs.github.io/protobuf.js/Type.html) - the `verify`, `encode`, and `encodeDelimited` methods this node uses
- [Protobuf encoding (wire format)](https://protobuf.dev/programming-guides/encoding/) - how messages are represented as bytes
- [Streaming multiple messages](https://protobuf.dev/programming-guides/techniques/#streaming) - why length-delimited framing exists
- [Field presence](https://protobuf.dev/programming-guides/field_presence/) - why proto3 default values disappear and how `optional` fixes it
