<script type="text/javascript">
    RED.nodes.registerType('protobuf-file', {
        category: 'config',
        defaults: {
            protopath: { value: "", required: true, label: "Proto path" },
            watchFile: { value: true },
            keepCase: { value: false }
        },
        label: function() {
            var primaryPath = (this.protopath || "").split(",")[0].trim();
            if (!primaryPath) {
                return "protobuf file";
            }
            return primaryPath.split(/[\\/]/).pop() || primaryPath;
        }
    });
</script>

<script type="text/html" data-template-name="protobuf-file">
    <div class="form-row">
        <label for="node-config-input-protopath"><i class="fa fa-file-code-o"></i> Proto path</label>
        <input type="text" id="node-config-input-protopath" placeholder="/path/to/schema.proto">
    </div>
    <div class="form-tips" id="node-config-protopath-tip">
        Use commas to load multiple .proto files.
    </div>
    <div class="form-row">
        <label for="node-config-input-watchFile"><i class="fa fa-refresh"></i> Watch file</label>
        <input type="checkbox" id="node-config-input-watchFile" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Reload when a listed proto file changes</span>
    </div>
    <div class="form-tips" id="node-config-watch-tip">
        All listed files are watched. Rapid changes trigger a single reload.
    </div>
    <div class="form-row">
        <label for="node-config-input-keepCase"><i class="fa fa-code"></i> Keep case</label>
        <input type="checkbox" id="node-config-input-keepCase" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Keep names like <code>device_id</code></span>
    </div>
</script>

<script type="text/markdown" data-help-name="protobuf-file">
Loads one or more protobuf schema files for encode and decode nodes.

### Configuration

: Proto path (string) : Path to a `.proto` file. Use commas to load multiple files.
: Watch file (boolean) : Reloads the protobuf root when any configured file changes.
: Keep case (boolean) : Passes `keepCase` to protobuf.js so snake_case field names stay unchanged.

### Details

Use commas to load multiple `.proto` files. All listed files are watched; rapid changes trigger a single reload.

Example: `/flows/protos/messages.proto,/flows/protos/common.proto`.

By default protobuf.js converts snake_case field names to camelCase. Enable `keepCase` to keep snake_case names in encoded and decoded objects.

Example: `device_id` stays `device_id` instead of becoming `deviceId`.

### Example

A minimal proto3 schema file:

```proto
syntax = "proto3";

message SensorReading {
    string device_id = 1;
    double value = 2;
}
```

Load it here, then set the encode/decode **Type** field to `SensorReading`.

> [!TIP]
> **Schema tip:** plain proto3 scalar fields cannot distinguish "set to `false`/`0`" from "not set" - such values disappear after decode. Declare fields `optional` in proto3 when that distinction matters; proto2 and Editions schemas track presence by default.
>
> ```proto
> message SensorReading {
>     optional bool active = 3;  // false survives encode/decode
> }
> ```

### References

- [proto3 language guide](https://protobuf.dev/programming-guides/proto3/)
- [proto2 language guide](https://protobuf.dev/programming-guides/proto2/) - `required`, `optional`, and default values
- [Protobuf Editions](https://protobuf.dev/programming-guides/editions/) - edition 2023 and 2024 schemas
- [protobuf.js Root API](https://protobufjs.github.io/protobuf.js/Root.html) - file loading and the `keepCase` option
- [Field presence](https://protobuf.dev/programming-guides/field_presence/) - implicit vs explicit presence and the `optional` keyword
</script>
