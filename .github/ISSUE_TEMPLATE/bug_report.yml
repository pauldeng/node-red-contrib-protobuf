name: Bug report
description: Report a defect in the encode, decode, or protobuf-file nodes.
labels: ["bug"]
body:
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: From **Manage palette > Installed** in the Node-RED editor, or `npm ls @pauldeng/node-red-contrib-protobuf`.
      placeholder: "2.0.0"
    validations:
      required: true
  - type: input
    id: node-red-version
    attributes:
      label: Node-RED version
      placeholder: "4.0.5"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: 'Output of `uname -a` on Linux/macOS, or e.g. "Windows 11 23H2", "Docker (nodered/node-red:4.0)", "Home Assistant OS 12".'
      placeholder: "Ubuntu 24.04 / Linux 6.8.0-40-generic"
    validations:
      required: true
  - type: dropdown
    id: protobuf-syntax
    attributes:
      label: Protobuf syntax
      options:
        - proto3
        - proto2
        - editions 2023
        - editions 2024
        - n/a
    validations:
      required: true
  - type: textarea
    id: schema
    attributes:
      label: Minimal `.proto` schema
      description: Smallest schema that reproduces the issue. Inline preferred.
      render: protobuf
    validations:
      required: false
  - type: textarea
    id: flow
    attributes:
      label: Minimal Node-RED flow
      description: Paste the JSON from **Export selected flows**. Keep it small.
      render: json
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error messages from the Node-RED debug sidebar or the runtime console.
    validations:
      required: true
