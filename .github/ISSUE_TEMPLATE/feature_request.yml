name: Feature request
description: Suggest a new capability or change to an existing one.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current nodes do not support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Editor UI, message properties, new node, new option?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you have tried, or other approaches you considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Schema snippets, flow examples, references to protobuf docs, anything else useful.
    validations:
      required: false
