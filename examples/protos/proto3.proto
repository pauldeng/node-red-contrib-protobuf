// proto3 example schema.
//
// WARNING - "false vs not set": plain proto3 scalar fields have implicit
// presence. A value equal to the default (false, 0, "") is never
// transmitted, so it is missing after decode, and "set to false" cannot
// be told apart from "never set". Declare a field `optional` when that
// distinction matters, e.g.:  optional bool enabled = 6;
// See https://protobuf.dev/programming-guides/field_presence/
syntax = "proto3";

message TestType {
    double timestamp = 1;
    float foo = 2;
    bool bar = 3;
    string test = 4;
    // protobuf.js converts snake_case names to camelCase by default,
    // so this field appears as noMoreSnakeCase in decoded objects.
    // Enable "Keep case" on the protobuf-file node to keep snake_case.
    bool no_more_snake_case = 5;
}
