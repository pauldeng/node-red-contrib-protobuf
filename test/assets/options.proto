// Fixture exercising every protobuf.js toObject conversion option:
// an enum, a repeated field, a map, bytes, a 64-bit integer, a oneof,
// and a double (for NaN / Safe JSON).
syntax = "proto3";

message OptionsType {
    enum Color {
        RED = 0;
        GREEN = 1;
    }
    Color color = 1;
    repeated int32 numbers = 2;
    map<string, int32> labels = 3;
    bytes data = 4;
    int64 big = 5;
    double ratio = 6;
    oneof choice {
        string text = 7;
        int32 count = 8;
    }
}
